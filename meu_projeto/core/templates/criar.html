<!DOCTYPE html>
<html>
<head>
    <title>Criar Produto</title>
</head>
<body>

    <h1>Novo Produto</h1>

    <form method="POST">

        {% csrf_token %}

        <input type="text" name="nome" placeholder="Nome">

        <input type="number" step="0.01" name="preco" placeholder="Preço">

        <button type="submit">
            Salvar
        </button>

    </form>

</body>
</html>
